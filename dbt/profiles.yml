# Project-local profile. Run dbt with --profiles-dir dbt  (or set DBT_PROFILES_DIR=dbt).
# Reads the same SNOWFLAKE_* env vars as the rest of the project; no secrets in the repo.
job_market:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE') }}"
      schema: ANALYTICS
      threads: 4
      client_session_keep_alive: false
